name: Scrape Farm Listings

on:
  schedule:
    # Daily at 8am ET (12:00 UTC) - rotates 3 states, no render (1 credit each)
    - cron: '0 12 * * *'
    # Weekly Sunday at 6am ET (10:00 UTC) - all states with render (images)
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      all_states:
        description: 'Scrape all states (not just rotation)'
        type: boolean
        default: false
      render:
        description: 'Use render mode for images (5 credits each)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scraper
        run: |
          ARGS=""
          # Weekly Sunday cron or manual all_states = scrape everything
          if [ "${{ github.event.schedule }}" = "0 10 * * 0" ] || [ "${{ inputs.all_states }}" = "true" ]; then
            ARGS="--all"
          fi
          npx tsx scripts/scrape.ts $ARGS
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          # Weekly Sunday cron or manual render = enable render mode for images
          SCRAPER_RENDER: ${{ github.event.schedule == '0 10 * * 0' || inputs.render == 'true' }}

      - name: Commit and push listings data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATESTAMP=$(date -u +%Y-%m-%d)
            git commit -m "data: update farm listings ${DATESTAMP}"
            git push
          fi

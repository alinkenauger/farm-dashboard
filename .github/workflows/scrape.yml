name: Scrape Farm Listings

on:
  schedule:
    # Daily at 8am ET (12:00 UTC) - rotates 3 states per day
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      all_states:
        description: 'Scrape all states (not just rotation)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scraper
        run: |
          if [ "${{ inputs.all_states }}" = "true" ]; then
            npx tsx scripts/scrape.ts --all
          else
            npx tsx scripts/scrape.ts
          fi
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

      - name: Commit and push listings data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATESTAMP=$(date -u +%Y-%m-%d)
            git commit -m "data: update farm listings ${DATESTAMP}"
            git push
          fi
